<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>猛士售后服务网络地图</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-section" aria-label="猛士售后服务网络地图">
        <header class="topbar">
          <div>
            <h1>猛士售后服务网络地图</h1>
            <p id="sourceText">正在加载门店清单...</p>
          </div>
          <div class="legend" aria-label="图例">
            <span><i class="legend-dot first"></i>一网</span>
            <span><i class="legend-dot second"></i>二网</span>
          </div>
        </header>

        <div class="map-toolbar" aria-label="地图工具">
          <button id="zoomOut" type="button" title="缩小">−</button>
          <input id="zoomRange" type="range" min="0.18" max="3.2" step="0.02" value="1" aria-label="缩放" />
          <button id="zoomIn" type="button" title="放大">+</button>
          <button id="resetView" type="button">重置</button>
        </div>

        <div id="mapViewport" class="map-viewport">
          <div id="mapPlane" class="map-plane">
            <svg id="chinaSvg" class="china-svg" role="img" aria-label="中国地图"></svg>
            <div id="pinLayer" class="pin-layer" aria-live="polite"></div>
          </div>
        </div>
        <div id="tooltip" class="tooltip" role="status" hidden></div>
      </section>

      <aside class="side-panel" aria-label="门店筛选和列表">
        <div class="panel-header">
          <h2>门店网络</h2>
          <span id="resultCount">0 个点位</span>
        </div>

        <div class="stats-grid">
          <div>
            <strong id="totalCount">0</strong>
            <span>总门店</span>
          </div>
          <div>
            <strong id="cityCount">0</strong>
            <span>覆盖城市</span>
          </div>
          <div>
            <strong id="provinceCount">0</strong>
            <span>覆盖省份</span>
          </div>
        </div>

        <label class="search-box">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="门店、城市、地址、编码" autocomplete="off" />
        </label>

        <div class="filter-row" aria-label="网络筛选">
          <label><input id="filterFirst" type="checkbox" checked />一网</label>
          <label><input id="filterSecond" type="checkbox" checked />二网</label>
        </div>

        <section id="selectedStore" class="selected-store" aria-label="当前门店">
          <span class="empty-text">鼠标移到大头钉或列表项上查看详情。</span>
        </section>

        <div id="storeList" class="store-list" aria-label="门店列表"></div>
      </aside>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
